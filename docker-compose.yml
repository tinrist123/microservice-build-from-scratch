  redis-master:
    image: redis:7.4-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy noeviction
      --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    volumes:
      - D:\Learning\docker-storage\redis:/data
    restart: unless-stopped
    networks:
      - mynet

  redis-replica:
    image: redis:7.4-alpine
    container_name: redis-replica
    ports:
      - "6380:6379"
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy noeviction
      --replicaof redis-master 6379
    deploy:
      resources:

        limits:
          memory: 256M
          cpus: "0.50"
    volumes:
      - D:\Learning\docker-storage\redis:/data
    restart: unless-stopped
    networks:
      - mynet
    depends_on:
      - redis-master

  redis-sentinel-1:
    image: redis:7.4-alpine
    container_name: redis-sentinel-1
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - D:\Learning\docker-storage\redis-sentinel\sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
    networks:
      - mynet

  redis-sentinel-2:
    image: redis:7.4-alpine
    container_name: redis-sentinel-2
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - D:\Learning\docker-storage\redis-sentinel\sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26380:26379"
    depends_on:
      - redis-master
    networks:
      - mynet

  redis-sentinel-3:
    image: redis:7.4-alpine
    container_name: redis-sentinel-3
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - D:\Learning\docker-storage\redis-sentinel\sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26381:26379"
    depends_on:
      - redis-master
    networks:
      - mynet

  redis-sentinel-local:
    image: redis:7.4-alpine
    container_name: redis-sentinel-local
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - D:\Learning\docker-storage\redis-sentinel\sentinel-local.conf:/etc/redis/sentinel.conf
    ports:
      - "26399:26379"
    depends_on:
      - redis-master
    networks:
      - mynet
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - D:/Learning/docker-storage/rabbitmq:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - mynet

  meilisearch:
    image: getmeili/meilisearch:v1.35.0
    container_name: meilisearch
    ports:
      - "7700:7700"
    volumes:
      - D:/Learning/docker-storage/meilisearch/meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: FcLdiwiHOObQthn2I_dR04RJFJwGGZ-It_Jc4EpBE9Q
    networks:
      - mynet
volumes:
  nexus-data:
