version: "3.8"

networks:
  mynet:
    driver: bridge

services:
  mysql:
    image: mysql
    container_name: mysql
    hostname: 2366b6bd5e53
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: jpa-approach
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_MAJOR: innovation
      MYSQL_VERSION: 9.1.0-1.el9
      MYSQL_SHELL_VERSION: 9.1.0-1.el9
      GOSU_VERSION: 1.17
    volumes:
      - D:/Learning/docker-storage/mysql:/var/lib/mysql
    restart: "no"
    networks:
      - mynet
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms2g -Xmx2g -XX:MaxDirectMemorySize=2g
    networks:
      - mynet

