
openapi: 3.0.3
info:
  title: Common Schemas
  version: 1.0.0
  description: Reusable common schemas for all services

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        status:
          type: integer
          format: int32
          description: HTTP status code
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Error message
        path:
          type: string
          description: Request path

    PageResponse:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
      properties:
        page:
          type: integer
          format: int32
          description: Current page number (zero-based)
          minimum: 0
        size:
          type: integer
          format: int32
          description: Number of items per page
          minimum: 1
        totalElements:
          type: integer
          format: int64
          description: Total number of products matching the criteria
          minimum: 0
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
          minimum: 0
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        empty:
          type: boolean
          description: Whether the page is empty
